title: Non-root account with UID 0
id: 8f1b9a2e-1a1b-4c1a-9f1a-000000000009
status: experimental
level: critical
logsource:
    category: persistence
detection:
    sel:
        event_type: inventory
        inventory.query_name: users_snapshot
        inventory.columns.uid: '0'
    filter:
        inventory.columns.username: root
    condition: sel and not filter
tags:
