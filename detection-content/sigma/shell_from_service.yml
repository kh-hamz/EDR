title: Shell spawned from a network-facing service
id: 8f1b9a2e-1a1b-4c1a-9f1a-000000000001
status: experimental
level: high
logsource:
    category: process_creation
detection:
    sel:
        event_type: process_create
        process.name:
            - sh
            - bash
            - dash
        process.parent.name:
            - sshd
            - cron
            - crond
            - apache2
            - httpd
            - nginx
            - php-fpm
    condition: sel
tags:
    - attack.execution
    - attack.t1059
