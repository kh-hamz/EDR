title: Log file deleted
id: 8f1b9a2e-1a1b-4c1a-9f1a-000000000008
status: experimental
level: high
logsource:
    category: file_event
detection:
    sel:
        event_type: file_event
        file.action: delete
        # .keyword: see reverse_shell.yml for why contains needs the unanalyzed subfield.
        file.path.keyword|contains:
            - '/var/log/'
            - 'wtmp'
            - 'btmp'
    condition: sel
tags:
    - attack.defense-evasion
    - attack.t1070
