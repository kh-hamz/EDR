title: Credential file read
id: 8f1b9a2e-1a1b-4c1a-9f1a-000000000003
status: experimental
level: high
logsource:
    category: file_event
detection:
    sel:
        event_type: file_event
        file.action: read
        # .keyword: file.path is an analyzed text field; see reverse_shell.yml
        # for why contains-modifiers need the unanalyzed subfield.
        file.path.keyword|contains:
            - '/etc/shadow'
            - '/etc/passwd'
            - '.ssh/id_rsa'
            - '.ssh/id_ed25519'
    condition: sel
tags:
    - attack.credential-access
    - attack.t1003
    - attack.t1552
