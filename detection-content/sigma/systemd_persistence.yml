title: New custom systemd unit installed
id: 8f1b9a2e-1a1b-4c1a-9f1a-000000000005
status: experimental
level: medium
logsource:
    category: persistence
detection:
    # osquery.conf scopes this query to fragment_path LIKE /etc/systemd/system/%,
    # which is where locally-installed (non-package) units live, so any new
    # entry here is inherently worth a look, no keyword filtering needed.
    sel:
        event_type: inventory
        inventory.query_name: systemd_units
        inventory.action: added
    condition: sel
tags:
    - attack.persistence
    - attack.t1543.002
