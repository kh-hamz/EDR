title: Download piped directly into a shell
id: 8f1b9a2e-1a1b-4c1a-9f1a-00000000000a
status: experimental
level: high
logsource:
    category: process_creation
detection:
    sel:
        event_type: process_create
        process.name:
            - curl
            - wget
        # .keyword: see reverse_shell.yml for why contains needs the unanalyzed subfield.
        process.cmdline.keyword|contains:
            - '| sh'
            - '|sh'
            - '| bash'
            - '|bash'
    condition: sel
tags:
    - attack.execution
    - attack.t1105
